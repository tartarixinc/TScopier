[build]
  command = "npm run build"
  publish = "dist"

# Hashed assets — long cache (immutable filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Shell — always revalidate so deploys pick up new chunk hashes
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# SPA client-side routing (static files under /assets are served first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
