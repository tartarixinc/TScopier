name: Docs CI

on:
  pull_request:
    paths:
      - "apps/docs/**"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - ".github/workflows/docs-ci.yml"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/docs/package.json

      - name: Install docs dependencies
        run: npm install --prefix apps/docs

      - name: Build docs
        run: npm run build --prefix apps/docs
