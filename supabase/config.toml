# Edge Function routing (JWT vs API keys)
# https://supabase.com/docs/guides/functions/auth
#
# execute-trade: HTTP entry for tests/tools; production path also inlines this from parse-signal. New Supabase
# secrets (sb_secret_*) are NOT JWTs and must use the apikey header — Bearer is rejected by the gateway
# as UNAUTHORIZED_INVALID_JWT_FORMAT.

[functions.execute-trade]
verify_jwt = false
