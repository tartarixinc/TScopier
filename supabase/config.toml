# Edge Function routing (JWT vs API keys)
# https://supabase.com/docs/guides/functions/auth
#
# Service-role callers use the `apikey` header (not Bearer) for sb_secret_* keys.

[functions.execute-trade]
verify_jwt = false

[functions.sync-mt-servers]
verify_jwt = false

[functions.backtest-run]
verify_jwt = false
